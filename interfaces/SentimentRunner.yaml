%YAML 1.1
---
name: SentimentRunner
spec_version: 1.1
spec_type: interface
description: "This capability depends on the perception stack functionalities and allows the robot to analyze text data for sentiment analysis. This capability can be used by the
              decision-making authority such as an LLM to process text inputs and identify the emotional condition of a conversation. This capability can be triggered via the xml command
              '<Runner interface=fp_perception_capabilities/SentimentRunner provider=fp_perception_capabilities/SentimentRunner text='$value' use_device='$value' audio_request_window='$value' />'.
              The `use_device` and `audio_request_window` attributes are optional and allow the runner to request live audio for analysis. As an example
              '<Runner interface=fp_perception_capabilities/SentimentRunner provider=fp_perception_capabilities/SentimentRunner text='Hello, how are you?' />' means the
              robot will analyze the sentiment of the provided text. On success, the runner emits `text` for the sentiment label, `score` for its confidence, and `analyzed_text`
              for the input that was actually processed."
interface:
  services:
    "/perception/sentiment_analysis":
      type: "fp_perception_msgs::srv::PerceptionSentiment"
      description: "Service interface for the perception sentiment analysis capability"