%YAML 1.1
---
name: SpeechRunner
spec_version: 1.1
spec_type: interface
description: "This capability depends on the perception stack functionalities and allows the robot to synthesize speech from text inputs. This capability can 
              be used by the decision-making authority such as an LLM to generate audio outputs from textual inputs. This capability can be triggered via the 
              xml command '<Runner interface=perception_capabilities/SpeechRunner provider=perception_capabilities/SpeechRunner use_device_audio='$value' text='$value' />'. 
              '$value' represents a value in the respective units. As an example 
              '<Runner interface=perception_capabilities/SpeechRunner provider=perception_capabilities/SpeechRunner use_device_audio='true' text='Hello, world!' /> 
              means the robot will use device audio and synthesize the text 'Hello, world!'.
interface:
  services:
    "/perception/speech":
      type: "perception_msgs::srv::PerceptionSpeech"
      description: "Service interface for the perception speech synthesis capability"