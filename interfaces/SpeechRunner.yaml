%YAML 1.1
---
name: SpeechRunner
spec_version: 1.1
spec_type: interface
description: "This capability depends on the perception stack functionalities and allows the robot to synthesize speech from text inputs. This capability can
              be used by the decision-making authority such as an LLM to generate audio outputs from textual inputs. This capability can be triggered via the
              xml command '<Runner interface=fp_perception_capabilities/SpeechRunner provider=fp_perception_capabilities/SpeechRunner use_device='$value' text='$value' voice='$value' instructions='$value' />'.
              The `voice` and `instructions` attributes are optional and are forwarded to the speech backend. As an example
              '<Runner interface=fp_perception_capabilities/SpeechRunner provider=fp_perception_capabilities/SpeechRunner use_device='true' text='Hello, world!' />'
              means the robot will use device audio and synthesize the text `Hello, world!`. On success, the runner emits a boolean `success` output that can be
              used by downstream plan logic."
interface:
  services:
    "/perception/speech":
      type: "fp_perception_msgs::srv::PerceptionSpeech"
      description: "Service interface for the perception speech synthesis capability"