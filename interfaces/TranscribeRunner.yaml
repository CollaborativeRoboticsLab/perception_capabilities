%YAML 1.1
---
name: TranscribeRunner
spec_version: 1.1
spec_type: interface
description: "This capability depends on the perception stack functionalities and allows the robot to transcribe audio data after listening to environmental sounds. 
              This capability can be used by the decision-making authority such as an LLM to process audio inputs and generate textual outputs. This capability can 
              be triggered via the xml command '<Runner interface=perception_capabilities/TranscribeRunner provider=perception_capabilities/TranscribeRunner use_device_audio='$value' device_buffer_time='$value' />'. 
              '$value' represents a value in the respective units. As an example 
              '<Runner interface=perception_capabilities/TranscribeRunner provider=perception_capabilities/TranscribeRunner use_device_audio='true' device_buffer_time='15' /> means the 
              robot will use device audio and buffer time of 15 seconds. capability prompt_capabilities/PromptTextRunner can be used to get textual output from this capability and use it for decision making."
interface:
  services:
    "/perception/transcription":
      type: "perception_msgs::srv::PerceptionTranscribe"
      description: "Service interface for the perception transcription capability"